name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # `make lint` would otherwise try to start the documan compose service in
  # the CI runner. Doc validation lives in its own pipeline:
  # `.github/workflows/documan.yml` (builds docker/documan/Dockerfile, whose
  # RUN step performs the lint).
  SKIP_DOCUMAN: "1"

jobs:
  validate:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
        # No `cache: "yarn"` here — setup-node would call `yarn cache dir`
        # before corepack runs, and the globally-installed Yarn 1 refuses
        # because package.json pins `packageManager: yarn@4`. We cache via
        # actions/cache below instead.

      - name: Enable corepack
        run: corepack enable

      - name: Cache Yarn 4 (.yarn/cache)
        # `enableGlobalCache: false` in .yarnrc.yml keeps the cache local at
        # .yarn/cache so this action can target a stable path.
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Cache Go tools ($GOBIN binaries + build cache)
        # `make install-tools` runs 5 `go install ...@latest` commands; each
        # rebuilds a transitive tree (golangci-lint alone is ~hundreds of
        # packages). Caching the resulting binaries + go-build cache makes
        # subsequent runs near-instant.
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/.cache/go-build
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}
          restore-keys: go-tools-${{ runner.os }}-

      - name: Install (Go deps + tools + frontend deps)
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
