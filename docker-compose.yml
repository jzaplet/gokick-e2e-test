services:
  app:
    build:
      context: .
      dockerfile: ./docker/production/Dockerfile
    env_file:
      - .env
    environment:
      # Container-absolute path overrides .env's host-relative APP_DB_PATH
      # (which is meant for `make serve` running directly on the host).
      APP_DB_PATH: /data/app.db
      # DELETE journal (rollback journal) instead of WAL — required when
      # the host (e.g. a SQLite GUI) reads the file through the same bind
      # mount the container writes to. Docker Desktop's virtualised FS does
      # not provide reliable mmap/shm coordination that WAL needs.
      APP_DB_JOURNAL_MODE: DELETE
    ports:
      - "${APP_HTTP_PORT}:${APP_HTTP_PORT}"
    volumes:
      - ./data:/data

  documan:
    build:
      context: .
      dockerfile: ./docker/documan/Dockerfile
    env_file:
      - .env
    ports:
      - "${DOCUMAN_HTTP_PORT}:${DOCUMAN_HTTP_PORT}"
    volumes:
      - ./docs:/documan/data/docs
      - ./README.md:/documan/data/README.md
